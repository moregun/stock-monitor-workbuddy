<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏦 A股17只赚钱天团股票监测面板</title>
  <style>
    /* ============================================================
       全局样式 — 深色主题，清爽无广告
       ============================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: #58a6ff; text-decoration: none; }

    /* ---------- 顶部栏 ---------- */
    .header {
      background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f0f6ff;
    }
    .header h1 span { color: #ff9f43; }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: #8b949e;
    }
    .refresh-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .refresh-btn:hover { background: #2ea043; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---------- 大盘监测卡片（两列布局） ---------- */
    .hs300-card {
      margin: 20px 24px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    .hs300-card.panic {
      border-color: #ff4d4f;
      background: linear-gradient(135deg, #2d0a0a 0%, #161b22 100%);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,79,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(255,77,79,0); }
    }

    /* 两列通用卡片风格 */
    .hs300-col {
      background: #1c2333;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 20px;
    }

    /* 左列：沪深300价格 */
    .hs300-left { display: flex; flex-direction: column; gap: 6px; }
    .hs300-info { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .hs300-price { font-size: 32px; font-weight: 800; color: #f0f6ff; }
    .hs300-change {
      font-size: 15px; font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .hs300-change.up { color: #ff4d4f; background: rgba(255,77,79,0.12); }
    .hs300-change.down { color: #00e676; background: rgba(0,230,118,0.12); }
    .hs300-change.flat { color: #8b949e; }
    .hs300-reason { font-size: 13px; color: #8b949e; }
    .hs300-volume { font-size: 13px; color: #8b949e; margin-top: 6px; line-height: 1.8; }

    /* 左列底部状态标签 */
    .hs300-badge-wrap { margin-top: 10px; }
    .hs300-badge {
      display: inline-block;
      font-size: 13px;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 600;
    }
    .hs300-badge.panic-badge {
      background: rgba(255,77,79,0.18);
      color: #ff6b6b;
      border: 1px solid rgba(255,77,79,0.4);
    }
    .hs300-badge.normal-badge {
      background: rgba(88,166,255,0.12);
      color: #58a6ff;
      border: 1px solid rgba(88,166,255,0.3);
    }

    /* 右列：信号统计 */
    .hs300-right { display: flex; flex-direction: column; gap: 10px; }
    .hs300-stats-title {
      font-size: 13px;
      color: #8b949e;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .hs300-stats-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .hs300-stat {
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 600;
      white-space: nowrap;
    }
    .hs300-stat.green { background: rgba(0,200,83,0.12); color: #00c853; border: 1px solid rgba(0,200,83,0.3); }
    .hs300-stat.yellow { background: rgba(255,171,0,0.12); color: #ffab00; border: 1px solid rgba(255,171,0,0.3); }
    .hs300-stat.red { background: rgba(255,23,68,0.12); color: #ff1744; border: 1px solid rgba(255,23,68,0.3); }

    /* ---------- 板块分区 ---------- */
    .category-section {
      margin: 0 24px 28px 24px;
    }
    .category-title {
      font-size: 16px;
      font-weight: 700;
      color: #f0f6ff;
      margin-bottom: 12px;
      padding-left: 12px;
      border-left: 4px solid #58a6ff;
    }
    /* ---------- 股票列表表格 ---------- */
    .stock-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
    }
    .stock-table thead {
      background: #1c2333;
      color: #8b949e;
      font-size: 13px;
    }
    .stock-table th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid #30363d;
      white-space: nowrap;
    }
    .stock-table td {
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
      color: #e0e0e0;
      vertical-align: middle;
      white-space: nowrap;
    }
    .stock-table tbody tr:hover {
      background: #1c2333;
    }
    .stock-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* 股票名称加粗 */
    .td-name { font-weight: 700; color: #f0f6ff; }

    /* 涨跌幅颜色 */
    .chg-up { color: #ff4d4f; }
    .chg-down { color: #00e676; }
    .chg-flat { color: #8b949e; }

    /* 买入信号标签 */
    .sig-tag {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
    }
    .sig-tag.green { background: rgba(0,200,83,0.15); color: #00c853; }
    .sig-tag.yellow { background: rgba(255,171,0,0.15); color: #ffab00; }
    .sig-tag.red { background: rgba(255,23,68,0.15); color: #ff1744; }

    /* 左侧信号线 */
    .stock-table tbody tr.sig-green { border-left: 3px solid #00c853; }
    .stock-table tbody tr.sig-yellow { border-left: 3px solid #ffab00; }
    .stock-table tbody tr.sig-red { border-left: 3px solid #ff1744; }

    /* 板块策略说明 */
    .strategy-box {
      background: #1c2333;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 14px;
      font-size: 13px;
      line-height: 2;
    }
    .strategy-box .strategy-title {
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .strategy-box .strategy-item {
      color: #c9d1d9;
      padding-left: 2px;
    }
    .strategy-box .strategy-item.green-flag { color: #00c853; }
    .strategy-box .strategy-item.yellow-flag { color: #ffab00; }
    .strategy-box .strategy-item.blue-flag { color: #58a6ff; }

    /* 信号原因列表（表格内展开用） */
    .reasons-list {
      list-style: none;
      font-size: 12px;
      color: #8b949e;
      line-height: 1.8;
      margin-top: 4px;
    }

    /* ---------- Loading / Error ---------- */
    .loading-box {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
      font-size: 15px;
    }
    .error-box {
      margin: 20px 24px;
      background: rgba(255,77,79,0.08);
      border: 1px solid rgba(255,77,79,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      color: #ff6b6b;
      font-size: 14px;
    }

    /* ---------- 页脚 ---------- */
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #484f58;
      border-top: 1px solid #21262d;
      margin-top: 20px;
    }

    /* ---------- 响应式 ---------- */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; }
      .header h1 { font-size: 16px; }
      .hs300-card {
        margin: 12px 16px;
        padding: 14px 16px;
        grid-template-columns: 1fr;
      }
      .hs300-price { font-size: 24px; }
      .hs300-col { padding: 12px 14px; }
      .summary-bar { padding: 0 16px; }
      .category-section { margin: 0 16px 24px 16px; }
      .stock-table { font-size: 13px; }
      .stock-table th, .stock-table td { padding: 10px 8px; }
    }
  </style>
</head>
<body>

<!-- ========== 顶部栏 ========== -->
<div class="header">
  <h1>🏦 A股<span>17只赚钱天团</span>股票监测面板</h1>
  <div class="header-meta">
    <span id="update-time">加载中...</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">🔄 手动刷新</button>
  </div>
</div>

<!-- ========== 大盘监测（两列布局） ========== -->
<div class="hs300-card" id="hs300-card">

  <!-- 左列：沪深300 -->
  <div class="hs300-col">
    <div class="hs300-left">
      <div class="hs300-info">
        <span style="font-size:15px;color:#8b949e;">沪深300</span>
        <span class="hs300-price" id="hs300-price">--</span>
        <span class="hs300-change" id="hs300-change">--</span>
      </div>
      <div class="hs300-reason" id="hs300-reason"></div>
      <div class="hs300-volume" id="hs300-volume"></div>
    </div>
    <div class="hs300-badge-wrap">
      <div class="hs300-badge normal-badge" id="hs300-badge">监测中...</div>
    </div>
  </div>

  <!-- 右列：信号统计 -->
  <div class="hs300-col">
    <div class="hs300-right">
      <div class="hs300-stats-title">📊 全市场信号统计</div>
      <div class="hs300-stats-row" id="hs300-stats">
        <div class="hs300-stat green" id="sum-green">🟢 可买入：0 只</div>
        <div class="hs300-stat yellow" id="sum-yellow">🟡 观望：0 只</div>
        <div class="hs300-stat red" id="sum-red">🔴 不建议：0 只</div>
      </div>
    </div>
  </div>

</div>

<!-- ========== 内容容器 ========== -->
<div id="content"></div>

<!-- ========== 加载/错误状态 ========== -->
<div class="loading-box" id="loading-box">📡 正在加载数据，请稍候...</div>
<div class="error-box" id="error-box" style="display:none;"></div>

<!-- ========== 页脚 ========== -->
<div class="footer">
  数据来源：akshare（东方财富）｜更新频率：每天 10:00 和 14:00（北京时间）自动更新｜仅供学习参考，不构成投资建议
</div>

<script>
/* ============================================================
   核心 JS — 读取 data.json，渲染面板
   ============================================================ */
let CACHED_DATA = null;

// 颜色映射（A股规则：涨=红，跌=绿）
function getChangeClass(val) {
  if (val === null || val === undefined || isNaN(val)) return 'flat';
  if (val > 0) return 'up';    // 涨 → 红
  if (val < 0) return 'down';  // 跌 → 绿
  return 'flat';
}
function getChangeText(val) {
  if (val === null || val === undefined || isNaN(val)) return '--';
  return (val > 0 ? '+' : '') + val.toFixed(2) + '%';
}

// 信号对应 CSS 类
function signalClass(s) { return 'signal-' + (s || 'red'); }
function badgeClass(s) { return s || 'red'; }
function adviceClass(s) { return s || 'red'; }

// 股息率进度条颜色
function yieldBarClass(yieldVal, targetVal) {
  if (yieldVal === null || yieldVal === undefined) return 'low';
  if (yieldVal >= targetVal * 0.9) return 'high';
  if (yieldVal >= targetVal * 0.6) return 'mid';
  return 'low';
}
function yieldBarWidth(yieldVal, targetVal) {
  if (!yieldVal || !targetVal) return 0;
  return Math.min(100, (yieldVal / targetVal) * 100).toFixed(0);
}

// 格式化大数字（亿）
function fmtBillion(val) {
  if (!val || isNaN(val)) return '--';
  if (val >= 1e8) return (val / 1e8).toFixed(1) + ' 亿';
  if (val >= 1e4) return (val / 1e4).toFixed(1) + ' 万';
  return val.toFixed(0);
}

// 估值高低判断样式
function peClass(pe, category) {
  if (pe === null || pe === undefined || isNaN(pe)) return '';
  if (category === '银行' && pe < 5) return 'good';
  if (category === '成长股' && pe < 15) return 'good';
  if (category === '保险' && pe < 10) return 'good';
  if (pe < 0) return 'bad';
  return '';
}
function pbClass(pb) {
  if (pb === null || pb === undefined || isNaN(pb)) return '';
  if (pb < 0.65) return 'good';
  if (pb < 1.0) return 'warn';
  return '';
}

/* ========== 板块策略说明（动态读取实际值） ========== */
function getCategoryStrategy(title, stocks) {
  let items = [];

  if (title === '银行') {
    let bestPE = Infinity, bestPB = Infinity;
    for (const s of stocks) {
      if (s.pe !== null && s.pe < bestPE) bestPE = s.pe;
      if (s.pb !== null && s.pb < bestPB) bestPB = s.pb;
    }
    if (bestPE < 5 && bestPB < 0.65) {
      items.push({
        icon: '💎',
        text: '银行估值安全区：PE=' + bestPE.toFixed(2) + '＜5 且 PB=' + bestPB.toFixed(2) + '＜0.65，无脑买入线',
        cls: 'green-flag'
      });
    } else {
      items.push({
        icon: '💎',
        text: '银行估值安全区：PE＜5 且 PB＜0.65，无脑买入线',
        cls: 'green-flag'
      });
    }
    items.push({icon: '📅', text: '年底建仓期（10-12月），高股息股布局好时机', cls: 'blue-flag'});
  }

  if (title === '强周期能源') {
    // 获取实际油价（从全局数据或第一只股票）
    let oilPriceText = '--';
    let oilStatus = '';
    if (CACHED_DATA && CACHED_DATA.oil_price && CACHED_DATA.oil_price.price) {
      const op = CACHED_DATA.oil_price.price;
      const oc = CACHED_DATA.oil_price.change_pct;
      let ocStr = oc !== null ? (oc > 0 ? '+' : '') + oc.toFixed(2) + '%' : '';
      oilPriceText = '$' + op.toFixed(2) + (ocStr ? ' (' + ocStr + ')' : '');
      if (op >= 60 && op <= 80) oilStatus = '✅ 盈利舒适区';
      else if (op < 50) oilStatus = '⚠️ 偏低，盈利承压';
      else if (op > 85) oilStatus = '📈 高位，周期顶部风险';
    }
    items.push({icon: '💎', text: '中国石油/中国石化：核心看PB，PB≤1.0极佳买点，PB＞1.3高估区间', cls: 'green-flag'});
    items.push({icon: '💰', text: '中国神华：核心看股息率，≥6.5%极佳买点，＜4.5%高估区间', cls: 'green-flag'});
    let oilHint = '📡 辅助判断：国际油价' + oilPriceText;
    if (oilStatus) oilHint += ' — ' + oilStatus;
    items.push({icon: '🛢️', text: oilHint, cls: oilStatus.includes('✅') ? 'green-flag' : oilStatus.includes('⚠️') || oilStatus.includes('📈') ? 'yellow-flag' : 'blue-flag'});
  }

  if (title === '准公用事业') {
    items.push({icon: '💰', text: '中国移动：股息率≥5.5%或PE≤12为极佳买点，类债券资产', cls: 'green-flag'});
    items.push({icon: '💎', text: '长江电力：PE≤16且股息率≥4.5%为极佳买点，永续现金流', cls: 'green-flag'});
    items.push({icon: '💰', text: '宁沪高速：股息率≥6.5%或PE≤10为极佳买点，长三角核心路产', cls: 'green-flag'});
  }

  if (title === '消费白马') {
    items.push({icon: '💎', text: '贵州茅台：前瞻PE≤18且股息率≥4%为极佳买点，品牌壁垒深厚', cls: 'green-flag'});
    items.push({icon: '💎', text: '美的集团：PE≤11且股息率≥5.5%为极佳买点，全球化+ToB双驱动', cls: 'green-flag'});
    items.push({icon: '📅', text: '消费白马适合长期持有，估值底部布局后不宜频繁交易', cls: 'blue-flag'});
  }

  if (title === '保险') {
    let bestPEV = Infinity;
    for (const s of stocks) {
      let v = s.pev !== null ? s.pev : s.pe;
      if (v !== null && v < bestPEV) bestPEV = v;
    }
    if (bestPEV < 0.7) {
      items.push({
        icon: '💎',
        text: '保险PEV=' + bestPEV.toFixed(2) + '＜0.7，安全买入线',
        cls: 'green-flag'
      });
    } else {
      items.push({icon: '💎', text: '保险PEV＜0.7，安全买入线', cls: 'green-flag'});
    }
    items.push({icon: '📅', text: '年底建仓期（10-12月），高股息股布局好时机', cls: 'blue-flag'});
  }

  if (title === '高端制造成长') {
    items.push({icon: '🚀', text: '宁德时代：前瞻PE≤20且PEG≤0.8为极佳买点，成长与估值匹配', cls: 'yellow-flag'});
    items.push({icon: '📡', text: '辅助判断：全球市占率＞35%、储能增速＞30%为加分项', cls: 'blue-flag'});
  }

  if (items.length === 0) return '';
  const itemsHtml = items.map(function(it) {
    return '<div class="strategy-item ' + it.cls + '">• ' + it.icon + ' ' + it.text + '</div>';
  }).join('');
  return '<div class="strategy-box"><div class="strategy-title">' + title + '股票策略：</div>' + itemsHtml + '</div>';
}

/* ========== 渲染板块 ========== */
function renderCategory(title, stocks) {
  const countMap = {'银行': '9', '能源通信': '3', '保险': '2', '成长股': '1'};
  const count = countMap[title] || stocks.length;

  // 保险板块增加PEV列，强周期能源板块增加油价列，高端制造成长板块用PEG替换PB
  const showPEV = title === '保险';
  const showOilPrice = title === '强周期能源';
  const showPEG = title === '高端制造成长';

  // 表头
  let rows = '';
  for (const s of stocks) {
    const sig = s.signal || 'red';
    const sigLabel = sig === 'green' ? '可买入' : sig === 'yellow' ? '观望' : '不建议';
    const price = (s.price !== null && s.price !== undefined) ? s.price.toFixed(2) : '--';
    const pe = s.pe !== null ? s.pe.toFixed(2) : '--';
    const pb = s.pb !== null ? s.pb.toFixed(2) : '--';
    const yieldVal = s.dividend_yield !== null ? s.dividend_yield.toFixed(2) : '--';
    const chg = s.change_pct !== null && s.change_pct !== undefined ? s.change_pct.toFixed(2) + '%' : '--';
    const chgCls = s.change_pct > 0 ? 'chg-up' : s.change_pct < 0 ? 'chg-down' : 'chg-flat';
    const pbCls = pbClass(s.pb);

    let row = '<tr class="sig-' + sig + '">' +
      '<td>' + s.code + '</td>' +
      '<td class="td-name">' + s.name + '</td>' +
      '<td>' + s.category + '</td>' +
      '<td>' + price + ' <span class="' + chgCls + '">' + (s.change_pct > 0 ? '+' : '') + chg + '</span></td>' +
      '<td>' + (s.forward_dividend !== null && s.forward_dividend !== undefined ? s.forward_dividend.toFixed(3) : '--') + ' 元</td>' +
      '<td>' + yieldVal + '%</td>' +
      '<td>' + pe + '</td>';
    if (showPEG) {
      // 高端制造成长：用 PEG 替换 PB
      const pegVal = s.peg !== null && s.peg !== undefined ? s.peg.toFixed(2) : '--';
      const pegCls = (s.peg !== null && s.peg <= 0.8) ? 'metric-value good' : (s.peg !== null && s.peg <= 1.0) ? 'metric-value warn' : '';
      row += '<td class="' + pegCls + '">' + pegVal + '</td>';
    } else {
      row += '<td class="' + (pbCls === 'good' ? 'metric-value good' : pbCls === 'warn' ? 'metric-value warn' : '') + '">' + pb + '</td>';
    }
    if (showOilPrice) {
      const oilPrice = s.oil_price !== null && s.oil_price !== undefined ? s.oil_price.toFixed(2) : '--';
      const oilChg = s.oil_change_pct !== null && s.oil_change_pct !== undefined ? s.oil_change_pct.toFixed(2) : '';
      const oilChgCls = s.oil_change_pct > 0 ? 'chg-up' : s.oil_change_pct < 0 ? 'chg-down' : 'chg-flat';
      row += '<td>$' + oilPrice + (oilChg ? ' <span class="' + oilChgCls + '">' + (s.oil_change_pct > 0 ? '+' : '') + oilChg + '%</span>' : '') + '</td>';
    }
    if (showPEV) {
      const pev = s.pev !== null && s.pev !== undefined ? s.pev.toFixed(2) : '--';
      const pevCls = (s.pev !== null && s.pev < 0.7) ? 'metric-value good' : '';
      row += '<td class="' + pevCls + '">' + pev + '</td>';
    }
    row += '<td><span class="sig-tag ' + sig + '">' + sigLabel + '</span></td>' +
      '</tr>';
    rows += row;
  }

  let thead = '<tr>' +
    '<th>代码</th>' +
    '<th>名称</th>' +
    '<th>类型</th>' +
    '<th>现价</th>' +
    '<th>当年股息</th>' +
    '<th>股息率(%)</th>' +
    '<th>PE（动态）</th>';
  if (showPEG) {
    thead += '<th>PEG</th>';
  } else {
    thead += '<th>PB（市净率）</th>';
  }
  if (showOilPrice) {
    thead += '<th>国际油价(Brent)</th>';
  }
  if (showPEV) {
    thead += '<th>PEV</th>';
  }
  thead += '<th>买入信号</th>' + '</tr>';

  let html = '<div class="category-section">' +
    '<div class="category-title">' + title + '（' + count + ' 只）</div>' +
    getCategoryStrategy(title, stocks) +
    '<table class="stock-table">' +
    '<thead>' + thead + '</thead>' +
    '<tbody>' + rows + '</tbody>' +
    '</table>' +
    '</div>';
  return html;
}

/* ========== 主渲染 ========== */
function render(data) {
  // 1. 大盘
  const hs300 = data.hs300 || {};
  document.getElementById('hs300-price').textContent = hs300.price !== null ? hs300.price.toFixed(2) : '--';
  const changeElem = document.getElementById('hs300-change');
  changeElem.textContent = getChangeText(hs300.change_pct);
  changeElem.className = 'hs300-change ' + getChangeClass(hs300.change_pct);

  const card = document.getElementById('hs300-card');
  const badge = document.getElementById('hs300-badge');
  if (hs300.panic_signal) {
    card.classList.add('panic');
    badge.className = 'hs300-badge panic-badge';
    badge.textContent = '🔥 恐慌大跌！黄金买点';
  } else {
    card.classList.remove('panic');
    badge.className = 'hs300-badge normal-badge';
    badge.textContent = '大盘正常';
  }
  document.getElementById('hs300-reason').textContent = hs300.panic_reason || '';

  // 成交量萎缩信息
  const vol = hs300.volume;
  const volAvg = hs300.volume_20d_avg;
  const shrink = hs300.volume_shrink;
  const shrinkReason = hs300.volume_shrink_reason || '';
  let volHtml = '';
  if (vol !== null && vol !== undefined) {
    volHtml += '当日成交额：' + vol.toFixed(0) + ' 亿';
  }
  if (volAvg !== null && volAvg !== undefined) {
    volHtml += '，近20日均值：' + volAvg.toFixed(0) + ' 亿';
  }
  if (shrink !== null && shrink !== undefined) {
    if (shrink) {
      volHtml += '，<span style="color:#00c853;font-weight:700;">成交量萎缩 ✅</span>';
    } else {
      volHtml += '，<span style="color:#ff1744;font-weight:700;">成交量未萎缩 ❌</span>';
    }
  }
  if (shrinkReason) {
    volHtml += '<br><span style="font-size:12px;color:#8b949e;">' + shrinkReason + '</span>';
  }
  document.getElementById('hs300-volume').innerHTML = volHtml;

  // 2. 摘要统计（嵌入大盘卡片中列）
  const summary = data.summary || {};
  document.getElementById('sum-green').textContent = '🟢 可买入：' + (summary.green_count || 0) + ' 只';
  document.getElementById('sum-yellow').textContent = '🟡 观望：' + (summary.yellow_count || 0) + ' 只';
  document.getElementById('sum-red').textContent = '🔴 不建议：' + (summary.red_count || 0) + ' 只';
  document.getElementById('hs300-stats').style.display = 'flex';

  // 3. 板块
  const cats = data.categories || {};
  let contentHtml = '';
  const catOrder = ['银行', '强周期能源', '准公用事业', '消费白马', '保险', '高端制造成长'];
  for (const catName of catOrder) {
    if (cats[catName] && cats[catName].length > 0) {
      contentHtml += renderCategory(catName, cats[catName]);
    }
  }
  document.getElementById('content').innerHTML = contentHtml;

  // 4. 更新时间
  document.getElementById('update-time').textContent = '最后更新：' + (data.update_time || '--');
  document.getElementById('loading-box').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
}

/* ========== 加载数据 ========== */
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 加载中...';
  document.getElementById('loading-box').style.display = 'block';
  document.getElementById('error-box').style.display = 'none';

  try {
    // 加时间戳防止缓存
    const url = 'data.json?t=' + Date.now();
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    CACHED_DATA = data;
    render(data);
  } catch (err) {
    console.error('加载数据失败：', err);
    document.getElementById('loading-box').style.display = 'none';
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-box').innerHTML =
      '❌ 加载数据失败：' + err.message +
      '<br><br>💡 请确保 <code>data.json</code> 已生成并放在与 index.html 同一目录下。<br>' +
      '本地调试方法：在 <code>stock-monitor-workbuddy</code> 目录执行 <code>python -m http.server 8080</code>，然后访问 <code>http://localhost:8080</code>';
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 手动刷新';
  }
}

// 页面加载时自动拉取
loadData();

// 每5分钟自动刷新
setInterval(loadData, 5 * 60 * 1000);
</script>
