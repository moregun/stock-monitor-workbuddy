<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 分红数据编辑器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      line-height: 1.6;
      padding: 20px;
    }
    
    .header {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 20px;
      color: #f0f6ff;
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 13px;
      color: #8b949e;
    }
    
    .stats {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    
    .stat-item {
      background: #1c2333;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
    }
    
    .stat-item .num {
      font-size: 18px;
      font-weight: 700;
      color: #58a6ff;
    }
    
    .stock-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    
    .stock-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #21262d;
    }
    
    .stock-code {
      font-size: 16px;
      font-weight: 700;
      color: #58a6ff;
    }
    
    .stock-name {
      font-size: 16px;
      font-weight: 600;
      color: #f0f6ff;
    }
    
    .stock-status {
      margin-left: auto;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    
    .status-complete {
      background: rgba(0,200,83,0.12);
      color: #00c853;
      border: 1px solid rgba(0,200,83,0.3);
    }
    
    .status-incomplete {
      background: rgba(255,171,0,0.12);
      color: #ffab00;
      border: 1px solid rgba(255,171,0,0.3);
    }
    
    .dividend-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    .dividend-table th {
      text-align: left;
      padding: 8px 12px;
      color: #8b949e;
      font-weight: 600;
      border-bottom: 1px solid #30363d;
      font-size: 13px;
    }
    
    .dividend-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      color: #e0e0e0;
    }
    
    .dividend-table input {
      background: #0f1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 10px;
      color: #e0e0e0;
      font-size: 14px;
      width: 100%;
    }
    
    .dividend-table input:focus {
      outline: none;
      border-color: #58a6ff;
    }
    
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-add {
      background: #238636;
      color: #fff;
      margin-top: 10px;
    }
    
    .btn-add:hover { background: #2ea043; }
    
    .btn-remove {
      background: rgba(255,23,68,0.12);
      color: #ff1744;
      border: 1px solid rgba(255,23,68,0.3);
    }
    
    .btn-remove:hover { background: rgba(255,23,68,0.2); }
    
    .btn-save {
      background: #238636;
      color: #fff;
      padding: 10px 24px;
      font-size: 15px;
      margin-top: 20px;
    }
    
    .btn-save:hover { background: #2ea043; }
    
    .btn-load {
      background: #1f6feb;
      color: #fff;
      padding: 10px 24px;
      font-size: 15px;
      margin-top: 20px;
      margin-right: 12px;
    }
    
    .btn-load:hover { background: #388bfd; }
    
    .footer {
      margin-top: 20px;
      padding: 20px 24px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #1c2333;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 14px;
      color: #e0e0e0;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    
    .toast.success { border-color: #00c853; color: #00c853; }
    .toast.error { border-color: #ff1744; color: #ff1744; }
    
    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📝 分红数据编辑器</h1>
    <p>编辑 FORWARD_DIVIDEND.json — 补充2025年分红数据（半年报 + 年报预案）</p>
    <div class="stats">
      <div class="stat-item">总计：<span class="num" id="stat-total">15</span> 只</div>
      <div class="stat-item">完整：<span class="num" id="stat-complete">0</span> 只</div>
      <div class="stat-item">待补充：<span class="num" id="stat-incomplete">0</span> 只</div>
    </div>
  </div>
  
  <div id="stock-list"></div>
  
  <div class="footer">
    <button class="btn btn-load" onclick="loadFromFile()">📂 从文件加载</button>
    <button class="btn btn-save" onclick="saveToFile()">💾 保存到文件</button>
    <button class="btn btn-save" onclick="downloadJSON()" style="background: #1f6feb;">⬇️ 下载 JSON</button>
  </div>
  
  <script>
    let STOCK_DATA = {};
    
    // 加载 JSON 数据
    async function loadJSON() {
      try {
        const resp = await fetch('FORWARD_DIVIDEND.json?' + Date.now());
        STOCK_DATA = await resp.json();
        render();
        updateStats();
        showToast('✅ 数据加载成功', 'success');
      } catch (e) {
        showToast('❌ 加载失败：' + e.message, 'error');
      }
    }
    
    // 渲染所有股票
    function render() {
      const container = document.getElementById('stock-list');
      container.innerHTML = '';
      
      for (const [code, data] of Object.entries(STOCK_DATA)) {
        const card = createStockCard(code, data);
        container.appendChild(card);
      }
    }
    
    // 创建股票卡片
    function createStockCard(code, data) {
      const div = document.createElement('div');
      div.className = 'stock-card';
      div.id = 'card-' + code;
      
      const hasCompleteData = data.dividends && data.dividends.length >= 2;
      const statusClass = hasCompleteData ? 'status-complete' : 'status-incomplete';
      const statusText = hasCompleteData ? '✅ 数据完整' : '⚠️ 待补充';
      
      let html = `
        <div class="stock-header">
          <span class="stock-code">${code}</span>
          <span class="stock-name">${data.name || ''}</span>
          <span class="stock-status ${statusClass}">${statusText}</span>
        </div>
        <table class="dividend-table">
          <thead>
            <tr>
              <th>报告时间</th>
              <th>分红说明（如：10派5.65元）</th>
              <th>每股分红</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tbody-${code}">
      `;
      
      if (data.dividends && data.dividends.length > 0) {
        for (let i = 0; i < data.dividends.length; i++) {
          const d = data.dividends[i];
          html += `
            <tr>
              <td><input type="text" value="${d['报告时间'] || ''}" onchange="updateDividend('${code}', ${i}, '报告时间', this.value)"></td>
              <td><input type="text" value="${d['分红说明'] || ''}" onchange="updateDividend('${code}', ${i}, '分红说明', this.value)"></td>
              <td><input type="number" step="0.0001" value="${d['每股分红'] || 0}" onchange="updateDividend('${code}', ${i}, '每股分红', parseFloat(this.value))"></td>
              <td><button class="btn btn-remove" onclick="removeDividend('${code}', ${i})">删除</button></td>
            </tr>
          `;
        }
      }
      
      html += `
          </tbody>
        </table>
        <button class="btn btn-add" onclick="addDividend('${code}')">+ 添加分红记录</button>
        <div style="margin-top: 10px; font-size: 13px; color: #8b949e;">
          当前每股分红合计：<strong style="color: #58a6ff;">${calculateTotal(code).toFixed(4)}</strong> 元/股
        </div>
      `;
      
      div.innerHTML = html;
      return div;
    }
    
    // 计算总分红
    function calculateTotal(code) {
      const data = STOCK_DATA[code];
      if (!data.dividends) return 0;
      return data.dividends.reduce((sum, d) => sum + (d['每股分红'] || 0), 0);
    }
    
    // 更新分红数据
    function updateDividend(code, index, field, value) {
      STOCK_DATA[code].dividends[index][field] = value;
      updateTotal(code);
      updateStats();
    }
    
    // 添加分红记录
    function addDividend(code) {
      if (!STOCK_DATA[code].dividends) {
        STOCK_DATA[code].dividends = [];
      }
      STOCK_DATA[code].dividends.push({
        '报告时间': '2025年报预案',
        '分红说明': '',
        '每股分红': 0
      });
      render();
      updateStats();
    }
    
    // 删除分红记录
    function removeDividend(code, index) {
      STOCK_DATA[code].dividends.splice(index, 1);
      render();
      updateStats();
    }
    
    // 更新总分红
    function updateTotal(code) {
      const total = calculateTotal(code);
      STOCK_DATA[code]['total_dividend_per_share'] = total;
      STOCK_DATA[code]['forward_dividend_yield_base'] = total;
      
      const card = document.getElementById('card-' + code);
      if (card) {
        const totalEl = card.querySelector('strong');
        if (totalEl) totalEl.textContent = total.toFixed(4);
      }
    }
    
    // 更新统计
    function updateStats() {
      let complete = 0;
      let incomplete = 0;
      
      for (const [code, data] of Object.entries(STOCK_DATA)) {
        if (data.dividends && data.dividends.length >= 2) {
          complete++;
        } else {
          incomplete++;
        }
      }
      
      document.getElementById('stat-total').textContent = Object.keys(STOCK_DATA).length;
      document.getElementById('stat-complete').textContent = complete;
      document.getElementById('stat-incomplete').textContent = incomplete;
    }
    
    // 从文件加载
    function loadFromFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        const text = await file.text();
        try {
          STOCK_DATA = JSON.parse(text);
          render();
          updateStats();
          showToast('✅ 文件加载成功', 'success');
        } catch (err) {
          showToast('❌ 文件格式错误', 'error');
        }
      };
      input.click();
    }
    
    // 保存到文件
    function saveToFile() {
      for (const [code, data] of Object.entries(STOCK_DATA)) {
        data['total_dividend_per_share'] = calculateTotal(code);
        data['forward_dividend_yield_base'] = calculateTotal(code);
        delete data['note'];
      }
      
      const json = JSON.stringify(STOCK_DATA, null, 2);
      const blob = new Blob([json], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'FORWARD_DIVIDEND.json';
      a.click();
      URL.revokeObjectURL(url);
      
      showToast('✅ 文件已保存', 'success');
    }
    
    // 下载 JSON
    function downloadJSON() {
      saveToFile();
    }
    
    // 显示提示
    function showToast(msg, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }
    
    // 页面加载时自动加载 JSON
    window.onload = () => {
      loadJSON();
    };
  </script>
</body>
</html>
